name: Build beta APK

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Gradle 9.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.0'

      - name: Validate source package
        run: bash scripts/validate.sh

      - name: Build debug APK
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/AetherScape-v0.5.0-beta.6-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AetherScape-beta-apk
          path: dist/*.apk
          if-no-files-found: error
