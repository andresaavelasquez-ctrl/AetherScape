plugins {
    id 'com.android.application'
}

def gdxVersion = '1.14.2'

configurations {
    natives
}

android {
    namespace 'dev.andres.aetherscape'
    compileSdk 36

    defaultConfig {
        applicationId 'dev.andres.aetherscape'
        minSdk 26
        targetSdk 36
        versionCode 5
        versionName '0.4.0-beta.5'
        testInstrumentationRunner 'android.test.InstrumentationTestRunner'
    }

    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix '.beta'
            versionNameSuffix '-debug'
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packaging {
        resources {
            excludes += ['META-INF/DEPENDENCIES', 'META-INF/LICENSE*', 'META-INF/NOTICE*']
        }
    }
}

dependencies {
    implementation "com.badlogicgames.gdx:gdx:$gdxVersion"
    implementation "com.badlogicgames.gdx:gdx-backend-android:$gdxVersion"

    natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-arm64-v8a"
    natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-armeabi-v7a"
    natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86_64"
}

tasks.register('copyAndroidNatives') {
    doFirst {
        file('src/main/jniLibs/arm64-v8a').mkdirs()
        file('src/main/jniLibs/armeabi-v7a').mkdirs()
        file('src/main/jniLibs/x86_64').mkdirs()
    }
    doLast {
        configurations.natives.files.each { jar ->
            def outputDir
            if (jar.name.contains('arm64-v8a')) outputDir = file('src/main/jniLibs/arm64-v8a')
            else if (jar.name.contains('armeabi-v7a')) outputDir = file('src/main/jniLibs/armeabi-v7a')
            else if (jar.name.contains('x86_64')) outputDir = file('src/main/jniLibs/x86_64')
            else return
            copy {
                from zipTree(jar)
                include '**/*.so'
                into outputDir
                eachFile { details -> details.path = details.name }
                includeEmptyDirs = false
            }
        }
    }
}

preBuild.dependsOn copyAndroidNatives
